name: lyriclearn
description: Learn and understand non-English songs - mobile app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Local database (replaces IndexedDB)
  sqflite: ^2.3.3+2
  path: ^1.9.0

  # HTTP client for Gemini API
  http: ^1.2.2

  # JSON serialization
  json_annotation: ^4.9.0

  # Clipboard & sharing
  share_plus: ^10.1.4

  # File saving
  path_provider: ^2.1.5

  # Environment variables (.env file)
  flutter_dotenv: ^5.2.1

  # Material design icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
